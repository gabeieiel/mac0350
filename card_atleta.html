<div class="card" style="background-image: url('{{ atleta.imagem_url }}'); background-size: cover; background-position: center;">
    <div class="card-actions">
        <button class="btn-icon" title="Editar" 
                hx-get="/atletas/{{ atleta.id }}/edit" 
                hx-target="closest .card"
                hx-swap="outerHTML"
                onclick="event.stopPropagation();">&#9998;</button>
                
        <button class="btn-icon" title="Excluir" 
                hx-delete="/atletas/{{ atleta.id }}" 
                hx-target="closest .card" 
                hx-swap="outerHTML"
                onclick="event.stopPropagation();">&#10006;</button>
    </div>
    
    <div class="card-info" style="z-index: 2; width: 100%; pointer-events: none;">
        <div class="card-title">{{ atleta.nome }}</div>
        {% if atleta.descricao %}
            <p style="font-size: 0.85rem; color: #ddd; margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 1px 1px 2px black;">{{ atleta.descricao }}</p>
        {% endif %}
    </div>
    
</div>
